<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Bento Grid</title>
    <meta name="description" content="A responsive bento grid layout with asymmetric cells — mobile-first, design-system agnostic.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="bento" aria-label="Bento grid layout">

        <div class="cell cell--stats">
            <span class="cell__tag">STATS</span>
            <span class="sk-row sk-row--between">
                <span class="sk sk--bar sk--w-40 sk--dim"></span>
                <span class="sk sk--pill sk--dim"></span>
            </span>
            <span class="sk sk--big-num"></span>
            <span class="sk-row" style="gap:0.25rem">
                <span class="sk sk--dot" style="width:0.3rem;height:0.3rem"></span>
                <span class="sk sk--bar sk--w-30 sk--dim"></span>
            </span>
            <span class="sk--spacer"></span>
            <span class="sk-row sk-row--spark" style="flex:1;align-items:flex-end;min-height:1.2rem;width:100%">
                <span class="sk sk--mini-bar" style="height:30%;flex:1"></span>
                <span class="sk sk--mini-bar" style="height:55%;flex:1"></span>
                <span class="sk sk--mini-bar" style="height:40%;flex:1"></span>
                <span class="sk sk--mini-bar" style="height:70%;flex:1"></span>
                <span class="sk sk--mini-bar" style="height:50%;flex:1"></span>
                <span class="sk sk--mini-bar" style="height:85%;flex:1"></span>
                <span class="sk sk--mini-bar" style="height:65%;flex:1"></span>
                <span class="sk sk--mini-bar" style="height:100%;flex:1"></span>
                <span class="sk sk--mini-bar" style="height:75%;flex:1"></span>
            </span>
        </div>

        <div class="cell cell--about" style="align-items:center;justify-content:center">
            <span class="cell__tag">ABOUT</span>
            <span class="sk sk--dot-lg" style="width:1.6rem;height:1.6rem"></span>
            <span class="sk sk--bar" style="width:60%;max-width:5rem"></span>
            <span class="sk sk--bar sk--dim" style="width:40%;max-width:3.5rem"></span>
            <span class="sk sk--divider" style="width:80%"></span>
            <span class="sk-row" style="justify-content:center;gap:0.3rem">
                <span class="sk sk--bar" style="width:22%;height:0.4rem"></span>
                <span class="sk sk--bar sk--dim" style="width:22%;height:0.4rem"></span>
                <span class="sk sk--bar sk--dim" style="width:22%;height:0.4rem"></span>
            </span>
            <span class="sk sk--bar sk--dim" style="width:80%;max-width:6rem"></span>
            <span class="sk sk--bar sk--dim" style="width:55%;max-width:4rem"></span>
        </div>

        <div class="cell cell--hero">
            <span class="cell__tag">HERO</span>
            <span class="sk sk--hero"></span>
            <span class="sk-row sk-row--between">
                <span class="sk sk--bar sk--w-50"></span>
                <span class="sk sk--pill"></span>
            </span>
            <span class="sk sk--bar sk--w-40 sk--dim"></span>
        </div>

        <div class="cell cell--media">
            <span class="cell__tag">MEDIA</span>
            <span class="sk-grid-2x2">
                <span class="sk sk--sq-sm"></span>
                <span class="sk sk--sq-sm"></span>
                <span class="sk sk--sq-sm"></span>
                <span class="sk sk--sq-sm"></span>
            </span>
        </div>

        <div class="cell cell--feat">
            <span class="cell__tag">FEAT</span>
            <span class="sk-row" style="gap:0.5rem">
                <span class="sk sk--dot-lg"></span>
                <div style="display:flex;flex-direction:column;gap:0.15rem;flex:1">
                    <span class="sk sk--bar sk--w-50"></span>
                    <span class="sk sk--bar sk--w-80 sk--dim"></span>
                </div>
                <span class="sk sk--pill sk--dim"></span>
            </span>
            <span class="sk sk--divider"></span>
            <span class="sk sk--bar sk--w-80 sk--dim"></span>
            <span class="sk sk--bar sk--w-60 sk--dim"></span>
            <span class="sk--spacer"></span>
            <span class="sk-row sk-row--between">
                <span class="sk sk--pill"></span>
                <span class="sk-row" style="gap:0.2rem;width:auto">
                    <span class="sk sk--dot sk--dim"></span>
                    <span class="sk sk--dot sk--dim"></span>
                    <span class="sk sk--dot"></span>
                </span>
            </span>
        </div>

        <div class="cell cell--feed">
            <span class="cell__tag">FEED</span>
            <span class="sk-row sk-row--between">
                <span class="sk sk--bar sk--w-40"></span>
                <span class="sk sk--pill sk--dim"></span>
            </span>
            <span class="sk sk--divider"></span>
            <span class="sk-row"><span class="sk sk--dot"></span><span class="sk sk--bar sk--grow"></span><span class="sk sk--bar sk--w-30 sk--dim"></span></span>
            <span class="sk-row"><span class="sk sk--dot"></span><span class="sk sk--bar sk--grow sk--dim"></span><span class="sk sk--bar sk--w-30 sk--dim"></span></span>
            <span class="sk-row"><span class="sk sk--dot"></span><span class="sk sk--bar sk--grow"></span><span class="sk sk--bar sk--w-30 sk--dim"></span></span>
            <span class="sk-row"><span class="sk sk--dot"></span><span class="sk sk--bar sk--grow sk--dim"></span><span class="sk sk--bar sk--w-30 sk--dim"></span></span>
        </div>

        <div class="cell cell--promo">
            <span class="cell__tag">PROMO</span>
            <span class="sk-row" style="gap:0.5rem">
                <span class="sk sk--sq-sm" style="width:2.2rem;height:2.2rem;flex-shrink:0;border-radius:0.4rem"></span>
                <div style="display:flex;flex-direction:column;gap:0.15rem;flex:1">
                    <span class="sk sk--bar sk--w-50"></span>
                    <span class="sk sk--bar sk--w-80 sk--dim"></span>
                </div>
            </span>
            <span class="sk sk--divider"></span>
            <span class="sk sk--bar sk--w-80 sk--dim"></span>
            <span class="sk sk--bar sk--w-60 sk--dim"></span>
            <span class="sk sk--bar sk--w-40 sk--dim"></span>
            <span class="sk--spacer"></span>
            <span class="sk-row sk-row--between">
                <span class="sk sk--pill"></span>
                <span class="sk-row" style="gap:0.25rem;width:auto">
                    <span class="sk sk--pill sk--dim"></span>
                    <span class="sk sk--bar sk--dim" style="width:1.5rem"></span>
                </span>
            </span>
        </div>

        <div class="cell cell--tasks" style="justify-content:space-between">
            <span class="cell__tag">TASKS</span>
            <span class="sk-row sk-row--between">
                <span class="sk sk--bar sk--w-40"></span>
                <span class="sk sk--bar sk--dim" style="width:1.5rem"></span>
            </span>
            <span class="sk sk--divider"></span>
            <span class="sk-row"><span class="sk sk--sq"></span><span class="sk sk--bar sk--grow sk--dim"></span></span>
            <span class="sk-row"><span class="sk sk--sq"></span><span class="sk sk--bar sk--grow"></span></span>
            <span class="sk-row"><span class="sk sk--sq"></span><span class="sk sk--bar sk--w-80 sk--dim"></span></span>
            <span class="sk-row"><span class="sk sk--sq"></span><span class="sk sk--bar sk--grow sk--dim"></span></span>
            <span class="sk-row"><span class="sk sk--sq"></span><span class="sk sk--bar sk--w-60"></span></span>
        </div>

        <div class="cell cell--card">
            <span class="cell__tag">CARD</span>
            <span class="sk sk--thumb"></span>
            <span class="sk sk--bar sk--w-60"></span>
            <span class="sk sk--bar sk--w-80 sk--dim"></span>
            <span class="sk sk--bar sk--w-40 sk--dim"></span>
            <span class="sk--spacer"></span>
            <span class="sk-row sk-row--between">
                <span class="sk-row" style="gap:0.2rem;width:auto">
                    <span class="sk sk--dot"></span>
                    <span class="sk sk--dot"></span>
                    <span class="sk sk--dot sk--dim"></span>
                </span>
                <span class="sk sk--pill sk--dim"></span>
            </span>
        </div>

    </div>

</body>

</html>
